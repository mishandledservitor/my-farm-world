[build]
  command   = "npm run build"
  publish   = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"

# SPA: serve index.html for all routes (no server-side routing)
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
